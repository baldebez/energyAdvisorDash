<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semáforo de Energia Familiar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            transition: background-color 0.5s ease;
        }
        #circulo-semaforo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transition: all 0.5s ease;
        }
        h1 { font-size: 3rem; margin: 0 0 10px 0; text-align: center; }
        p { font-size: 1.5rem; color: #aaa; margin: 5px 0; text-align: center; max-width: 80%; }
        .meta-dados {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            background: #1e1e1e;
            padding: 15px 30px;
            border-radius: 15px;
        }
        .dado { text-align: center; }
        .dado-valor { font-size: 2rem; font-weight: bold; color: white; }
        .dado-label { font-size: 0.9rem; color: #777; text-transform: uppercase; }
        .previsao {
            width: min(900px, 90vw);
            margin-top: 30px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
        }
        .previsao h2 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: #fff;
        }
        .previsao-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .grafico-container {
            width: 100%;
            overflow-x: auto;
        }
        .grafico {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            min-width: 100%;
            height: 220px;
            padding: 10px;
            background: #181818;
            border-radius: 12px;
        }
        .barra {
            flex: 1 0 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .barra-valor {
            width: 100%;
            border-radius: 8px 8px 0 0;
            transition: transform 0.2s ease;
        }
        .barra-valor:hover {
            transform: scaleY(1.02);
        }
        .barra-label {
            margin-top: 8px;
            font-size: 0.7rem;
            color: #bbb;
            text-align: center;
            line-height: 1.1rem;
        }
        .previsao-hora { font-size: 0.9rem; color: #ccc; }
        .previsao-cor { font-size: 0.95rem; font-weight: bold; }
        .previsao-preco { font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="circulo-semaforo"></div>
    <h1 id="status-texto">A carregar...</h1>
    <p id="motivo-texto">A ligar ao servidor local...</p>

    <div class="meta-dados">
        <div class="dado">
            <div id="valor-potencia" class="dado-valor">0 W</div>
            <div class="dado-label">Painéis / Casa</div>
        </div>
        <div class="dado">
            <div id="valor-preco" class="dado-valor">0.000 €</div>
            <div class="dado-label">Preço kWh (C/IVA)</div>
        </div>
        <div class="dado">
            <div id="valor-custo" class="dado-valor">0.0000 €/h</div>
            <div class="dado-label">Custo Instantâneo</div>
        </div>
        <div class="dado">
            <div id="valor-consumo-diario" class="dado-valor">0.000 kWh</div>
            <div class="dado-label">Consumo Hoje</div>
        </div>
        <div class="dado">
            <div id="valor-custo-diario" class="dado-valor">0.0000 €</div>
            <div class="dado-label">Custo Hoje</div>
        </div>
        <div class="dado">
            <div id="origem-preco" class="dado-valor">local</div>
            <div class="dado-label">Origem do Preço</div>
        </div>
    </div>

    <div class="previsao">
        <h2>Previsão dos próximos 6h (15m)</h2>
        <div class="grafico-container">
            <div id="grafico-previsao" class="grafico">
                <div class="barra">
                    <div class="barra-valor" style="height: 40%; background: #444"></div>
                    <div class="barra-label">A carregar</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function atualizarDashboard() {
            const endpoint = location.protocol.startsWith('http') ? '/dados_energia' : 'http://127.0.0.1:8080/dados_energia';
            if (!location.protocol.startsWith('http')) {
                document.getElementById('motivo-texto').innerText = 'Abra esta página via http://<IP>:8080 ou use o servidor local.';
            }

            // Faz o pedido ao script Python local que criámos
            fetch(endpoint)
                .then(response => response.json())
                .then(data => {
                    const circulo = document.getElementById('circulo-semaforo');
                    const status = document.getElementById('status-texto');
                    const motivo = document.getElementById('motivo-texto');
                    const potencia = document.getElementById('valor-potencia');
                    const preco = document.getElementById('valor-preco');
                    const custo = document.getElementById('valor-custo');
                    const grafico = document.getElementById('grafico-previsao');

                    // Atualizar Textos e Números
                    status.innerText = data.cor;
                    motivo.innerText = data.motivo;
                    preco.innerText = data.preco_kwh + " €";
                    custo.innerText = data.custo_por_hora.toFixed(4) + " €/h";
                    document.getElementById('valor-consumo-diario').innerText = (data.consumo_diario_kwh || 0).toFixed(3) + " kWh";
                    document.getElementById('valor-custo-diario').innerText = (data.custo_diario_eur || 0).toFixed(4) + " €";
                    document.getElementById('origem-preco').innerText = data.origem_preco || 'desconhecida';
                    
                    if(data.potencia < 0) {
                        potencia.innerText = "Prod: " + Math.abs(data.potencia) + " W";
                        potencia.style.color = "#4caf50";
                    } else {
                        potencia.innerText = data.potencia + " W";
                        potencia.style.color = "#ff9800";
                    }

                    // Atualizar gráfico de previsão de próximas horas
                    grafico.innerHTML = "";
                    if (data.previsao && data.previsao.length) {
                        const valores = data.previsao.map(item => item.valor);
                        const maxValor = Math.max(...valores, 0.1);

                        data.previsao.forEach(item => {
                            const altura = Math.max(10, (item.valor / maxValor) * 100);
                            const cor = item.cor === 'VERDE' ? '#4caf50' : item.cor === 'AMARELO' ? '#ffeb3b' : '#f44336';
                            const barra = document.createElement('div');
                            barra.className = 'barra';
                            barra.innerHTML = `
                                <div class="barra-valor" style="height: ${altura}%; background: ${cor};" title="${item.hora} — ${item.preco_kwh} €/kWh"></div>
                                <div class="barra-label">${item.hora.split(' ')[1]}</div>
                            `;
                            grafico.appendChild(barra);
                        });
                    } else {
                        grafico.innerHTML = '<div class="barra"><div class="barra-valor" style="height: 40%; background: #444"></div><div class="barra-label">Sem dados</div></div>';
                    }

                    // Atualizar Cor do Semáforo e Efeitos Visuais
                    if (data.cor === "VERDE") {
                        circulo.style.backgroundColor = "#4caf50";
                        circulo.style.boxShadow = "0 0 60px #4caf50";
                        document.body.style.backgroundColor = "#0c1a0e";
                    } else if (data.cor === "AMARELO") {
                        circulo.style.backgroundColor = "#ffeb3b";
                        circulo.style.boxShadow = "0 0 60px #ffeb3b";
                        document.body.style.backgroundColor = "#1a190c";
                    } else if (data.cor === "VERMELHO") {
                        circulo.style.backgroundColor = "#f44336";
                        circulo.style.boxShadow = "0 0 60px #f44336";
                        document.body.style.backgroundColor = "#1a0c0c";
                    }
                })
                .catch(error => {
                    console.error('Erro de fetch /dados_energia:', error);
                    document.getElementById('status-texto').innerText = "Erro";
                    document.getElementById('motivo-texto').innerText = "Não conseguiu comunicar com o servidor Python. Abra esta página em http://<IP>:8080.";
                });
        }

        window.onerror = function(message, source, lineno, colno, error) {
            console.error('Erro JS:', message, source, lineno, colno, error);
            document.getElementById('status-texto').innerText = 'Erro JS';
            document.getElementById('motivo-texto').innerText = message;
            return true;
        };

        // Atualiza os dados automaticamente de 30 em 30 segundos
        window.addEventListener('DOMContentLoaded', atualizarDashboard);
        setInterval(atualizarDashboard, 30000);
    </script>
</body>
</html>
