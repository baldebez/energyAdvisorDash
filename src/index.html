<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semáforo de Energia Familiar</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            background-color: #121212;
            color: white;
            transition: background-color 0.5s ease;
        }
        .controles {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-refresh {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: inherit;
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .btn-refresh:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        .btn-refresh:disabled {
            opacity: 0.5;
            cursor: wait;
        }
        #circulo-semaforo {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin: 20px 0;
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 8px solid rgba(255,255,255,0.1);
        }
        .preco-principal {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
        }
        .preco-unidade {
            font-size: 1.2rem;
            opacity: 0.8;
            font-weight: 400;
            margin-top: 5px;
        }
        h1 { font-size: 3.2rem; margin: 20px 0 10px 0; text-align: center; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        .footer-info {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .previsao {
            width: min(900px, 90vw);
            margin-top: 30px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .previsao h2 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: #fff;
        }
        .previsao-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .grafico-container {
            width: 100%;
            overflow-x: auto;
        }
        .grafico {
            display: flex;
            align-items: stretch; /* Garante que as colunas ocupem a altura toda */
            gap: 1px;
            width: 100%;
            height: 220px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        .barra {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .barra-valor {
            width: 100%;
            min-height: 5px; /* Garante que valores mínimos sejam visíveis */
            border-radius: 8px 8px 0 0;
            transition: transform 0.2s ease;
        }
        /* Tooltip melhorado */
        [title] {
            position: relative;
            cursor: help;
            text-decoration: underline dotted rgba(255,255,255,0.3);
        }
        .barra-valor:hover {
            transform: scaleY(1.02);
        }
        .barra-label {
            height: 1.2rem; /* Reserva espaço igual para todas as barras */
            margin-top: 5px;
            font-size: 0.7rem;
            color: #bbb;
            text-align: center;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .previsao-hora { font-size: 0.9rem; color: #ccc; }
        .previsao-cor { font-size: 0.95rem; font-weight: bold; }
        .previsao-preco { font-size: 1.1rem; }

        /* Tabela Resumo Canto Superior Direito */
        .tabela-resumo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.7);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 160px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .resumo-item { text-align: right; }
        .resumo-valor { font-size: 1.4rem; font-weight: bold; color: white; display: block; }
        .resumo-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Tabela Instantânea Canto Superior Esquerdo */
        .tabela-instantanea {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.7);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 160px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .instantanea-item { text-align: left; }
        .instantanea-valor { font-size: 1.4rem; font-weight: bold; color: white; display: block; }
        .instantanea-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="tabela-instantanea">
        <div class="instantanea-item">
            <div id="valor-potencia" class="instantanea-valor">0 W</div>
            <div class="instantanea-label">Consumo Atual</div>
        </div>
        <div class="instantanea-item">
            <div id="valor-custo" class="instantanea-valor">0.0000 €/h</div>
            <div class="instantanea-label">Custo Instantâneo</div>
        </div>
    </div>

    <div class="tabela-resumo">
        <div class="resumo-item">
            <div id="valor-consumo-diario" class="resumo-valor">0.000 kWh</div>
            <div class="resumo-label">Consumo Hoje</div>
        </div>
        <div class="resumo-item">
            <div id="valor-custo-diario" class="resumo-valor">0.0000 €</div>
            <div class="resumo-label">Custo Hoje</div>
        </div>
    </div>

    <h1 id="motivo-texto">A carregar...</h1>

    <div id="circulo-semaforo">
        <div id="valor-preco" class="preco-principal">---</div>
        <div class="preco-unidade">€ / kWh</div>
    </div>

    <div class="controles">
        <button id="btn-refresh" class="btn-refresh" onclick="manualRefresh()">🔄 Atualizar Agora</button>
    </div>

    <div class="previsao">
        <h2>Previsão das próximas 12h (15m)</h2>
        <div class="grafico-container">
            <div id="grafico-previsao" class="grafico">
                <div class="barra">
                    <div class="barra-valor" style="height: 40%; background: #444"></div>
                    <div class="barra-label">A carregar</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <span id="refresh-timer">Atualização em: 30s</span>
        <span>•</span>
        <span>Origem: <span id="origem-preco">---</span></span>
    </div>

    <script>
        const CORES = {
            'VERDE': { fundo: '#1b5e20', texto: '#ffffff' },
            'AMARELO': { fundo: '#fbc02d', texto: '#000000' },
            'VERMELHO': { fundo: '#c62828', texto: '#ffffff' }
        };

        let segundosParaRefresh = 30;
        let timerInterval;
        const REFRESH_DEFAULT = 30;

        function atualizarDashboard() {
            // Usa caminho relativo para funcionar em qualquer IP/Hostname
            const endpoint = '/dados_energia';
            const btn = document.getElementById('btn-refresh');
            if (btn) btn.disabled = true;

            // Faz o pedido ao script Python local que criámos
            return fetch(endpoint)
                .then(response => response.json())
                .then(data => {
                    const motivo = document.getElementById('motivo-texto');
                    const potencia = document.getElementById('valor-potencia');
                    const preco = document.getElementById('valor-preco');
                    const custo = document.getElementById('valor-custo');
                    const grafico = document.getElementById('grafico-previsao');

                    // Atualizar Textos e Números
                    motivo.innerText = data.motivo;
                    preco.title = data.detalhe_preco;
                    preco.innerText = data.preco_kwh.toFixed(3);
                    custo.innerText = data.custo_por_hora.toFixed(4) + " €/h";
                    document.getElementById('valor-consumo-diario').innerText = (data.consumo_diario_kwh || 0).toFixed(3) + " kWh";
                    document.getElementById('valor-custo-diario').innerText = (data.custo_diario_eur || 0).toFixed(4) + " €";
                    document.getElementById('origem-preco').innerText = data.origem_preco || 'desconhecida';
                    motivo.style.opacity = (data.cor === 'AMARELO') ? '0.7' : '1';
                    
                    if(data.potencia < 0) {
                        potencia.innerText = "Prod: " + Math.abs(data.potencia) + " W";
                        potencia.style.color = "#4caf50";
                    } else {
                        potencia.innerText = data.potencia + " W";
                        potencia.style.color = "#ff9800";
                    }

                    // Atualizar gráfico de previsão de próximas horas
                    grafico.innerHTML = "";
                    if (data.previsao && data.previsao.length) {
                        console.log("Dados de previsão recebidos:", data.previsao.length);
                        const valores = data.previsao.map(item => item.valor);
                        const maxValor = Math.max(...valores, 0.1);

                        data.previsao.forEach(item => {
                            // Calcula a altura da barra (descontando o espaço do texto em baixo)
                            const altura = Math.max(5, (item.valor / maxValor) * 85);
                            const cor = item.cor === 'VERDE' ? '#4caf50' : item.cor === 'AMARELO' ? '#ffeb3b' : '#f44336';
                            const barra = document.createElement('div');
                            barra.className = 'barra';
                            
                            // Só mostra a legenda se for uma hora certa e encurta para "14h"
                            const horaCompleta = item.hora.split(' ')[1];
                            const label = horaCompleta.endsWith(':00') ? horaCompleta.replace(':00', 'h') : '';

                            barra.innerHTML = `
                                <div class="barra-valor" style="height: ${altura}%; background: ${cor};" title="${item.hora} — ${item.preco_kwh} €/kWh (Original: ${item.preco_original_mwh} €/MWh)"></div>
                                <div class="barra-label">${label}</div>
                            `;
                            grafico.appendChild(barra);
                        });
                    } else {
                        console.warn("Previsão vazia recebida do servidor");
                        grafico.innerHTML = '<div class="barra"><div class="barra-valor" style="height: 40%; background: #444"></div><div class="barra-label">Sem dados</div></div>';
                    }

                    // Atualizar Cor do Semáforo e Efeitos Visuais
                    const configCor = CORES[data.cor];
                    if (configCor) {
                        document.body.style.backgroundColor = configCor.fundo;
                        document.body.style.color = configCor.texto;
                    } else {
                        document.body.style.backgroundColor = "#121212";
                    }
                    resetTimer(); // Reinicia o contador após sucesso
                })
                .catch(error => {
                    console.error('Erro de fetch /dados_energia:', error);
                    document.getElementById('status-texto').innerText = "Erro";
                    document.getElementById('motivo-texto').innerText = "Não conseguiu comunicar com o servidor Python. Abra esta página em http://<IP>:8080.";
                });
        }

        window.onerror = function(message, source, lineno, colno, error) {
            console.error('Erro JS:', message, source, lineno, colno, error);
            document.getElementById('status-texto').innerText = 'Erro JS';
            document.getElementById('motivo-texto').innerText = message;
            return true;
        };

        function resetTimer() {
            clearInterval(timerInterval);
            segundosParaRefresh = REFRESH_DEFAULT;
            const btn = document.getElementById('btn-refresh');
            if(btn) btn.disabled = false;
            
            timerInterval = setInterval(() => {
                segundosParaRefresh--;
                if (segundosParaRefresh <= 0) {
                    atualizarDashboard();
                } else {
                    document.getElementById('refresh-timer').innerText = `Próxima atualização em: ${segundosParaRefresh}s`;
                }
            }, 1000);
        }

        function manualRefresh() {
            const btn = document.getElementById('btn-refresh');
            btn.disabled = true;
            btn.innerText = "A atualizar...";
            atualizarDashboard().then(() => {
                btn.innerText = "🔄 Atualizar Agora";
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            atualizarDashboard();
        });
    </script>
</body>
</html>
